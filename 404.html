<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ffffff;
    }

    /* Three.js Canvas */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      opacity: 0.5;
      pointer-events: none;
    }

    /* Content Layer */
    .content-layer {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px 60px;
      text-align: center;
    }

    /* Wordmark */
    .wordmark {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 10;
    }

    .wordmark a {
      color: #ffffff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1.5px;
      transition: opacity 0.2s ease;
    }

    .wordmark a:hover {
      opacity: 0.75;
    }

    /* 404 Number */
    .error-number {
      font-size: 120px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #4F8EF7, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse-scale 3s ease-in-out infinite;
      margin-bottom: 0;
    }

    @keyframes pulse-scale {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    /* Headline */
    .headline {
      font-size: 24px;
      font-weight: 500;
      color: #ffffff;
      margin-top: 16px;
    }

    /* Subtext */
    .subtext {
      font-size: 15px;
      color: #9999aa;
      line-height: 1.7;
      max-width: 420px;
      margin: 12px auto 0;
    }

    /* Buttons */
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: #4F8EF7;
      color: #ffffff;
      border: 1px solid #4F8EF7;
    }

    .btn-primary:hover {
      background: #3d7de6;
      border-color: #3d7de6;
      box-shadow: 0 0 20px rgba(79, 142, 247, 0.25);
    }

    .btn-outline {
      background: transparent;
      color: #9999aa;
      border: 1px solid rgba(79, 142, 247, 0.4);
    }

    .btn-outline:hover {
      border-color: #4F8EF7;
      color: #ffffff;
    }

    .btn-ghost {
      background: transparent;
      color: #9999aa;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-ghost:hover {
      border-color: #ffffff;
      color: #ffffff;
    }

    .whatsapp-icon {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #555566;
      z-index: 10;
      pointer-events: none;
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      .error-number {
        animation: none;
      }

      #bg-canvas {
        display: none;
      }

      body {
        background: #0a0a0f;
      }
    }

    /* Mobile Responsive */
    @media (max-width: 640px) {
      .wordmark {
        top: 20px;
        left: 20px;
      }

      .wordmark a {
        font-size: 16px;
      }

      .error-number {
        font-size: 72px;
      }

      .headline {
        font-size: 20px;
      }

      .subtext {
        font-size: 14px;
      }

      .button-row {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }

      .content-layer {
        padding: 32px 20px 72px;
      }
    }

    @media (max-width: 380px) {
      .error-number {
        font-size: 60px;
      }

      .headline {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function () {
      // Respect reduced motion
      var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) return;

      var canvas = document.getElementById('bg-canvas');
      if (!canvas || !window.THREE) return;

      // Scene setup
      var scene = new THREE.Scene();
      var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 4;

      var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      // Particles
      var PARTICLE_COUNT = 900;
      var positions = new Float32Array(PARTICLE_COUNT * 3);
      var velocities = new Float32Array(PARTICLE_COUNT * 3);
      var colors = new Float32Array(PARTICLE_COUNT * 3);

      var blueColor = new THREE.Color('#4F8EF7');
      var purpleColor = new THREE.Color('#7C3AED');

      for (var i = 0; i < PARTICLE_COUNT; i++) {
        // Start in a rough sphere/cluster
        var theta = Math.random() * Math.PI * 2;
        var phi = Math.acos(2 * Math.random() - 1);
        var radius = Math.random() * 1.8 + 0.2;

        positions[i * 3]     = radius * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = radius * Math.cos(phi);

        // Drift velocity — outward from center
        var len = Math.sqrt(
          positions[i * 3] * positions[i * 3] +
          positions[i * 3 + 1] * positions[i * 3 + 1] +
          positions[i * 3 + 2] * positions[i * 3 + 2]
        );
        var safeLen = Math.max(len, 0.001);
        var drift = 0.0003 + Math.random() * 0.0008;

        velocities[i * 3]     = (positions[i * 3] / safeLen) * drift;
        velocities[i * 3 + 1] = (positions[i * 3 + 1] / safeLen) * drift;
        velocities[i * 3 + 2] = (positions[i * 3 + 2] / safeLen) * drift;

        // Color: mix of blue and purple
        var mix = Math.random();
        var color = blueColor.clone().lerp(purpleColor, mix);
        colors[i * 3]     = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }

      var geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      var material = new THREE.PointsMaterial({
        size: 0.02,
        vertexColors: true,
        transparent: true,
        opacity: 1.0,
        sizeAttenuation: true,
        depthWrite: false
      });

      var particles = new THREE.Points(geometry, material);
      scene.add(particles);

      // Mouse tracking for parallax
      var mouseX = 0;
      var mouseY = 0;
      var targetX = 0;
      var targetY = 0;

      document.addEventListener('mousemove', function (e) {
        targetX = (e.clientX / window.innerWidth - 0.5) * 40; // ±20px equivalent in 3D space
        targetY = (e.clientY / window.innerHeight - 0.5) * 40;
      });

      // Animation loop
      var animationId;

      function animate() {
        animationId = requestAnimationFrame(animate);

        // Update particle positions — drift outward
        var posArray = geometry.attributes.position.array;
        for (var i = 0; i < PARTICLE_COUNT; i++) {
          posArray[i * 3]     += velocities[i * 3];
          posArray[i * 3 + 1] += velocities[i * 3 + 1];
          posArray[i * 3 + 2] += velocities[i * 3 + 2];
        }
        geometry.attributes.position.needsUpdate = true;

        // Gentle Y-axis rotation
        particles.rotation.y += 0.0008;

        // Mouse parallax — smooth lerp
        mouseX += (targetX - mouseX) * 0.03;
        mouseY += (targetY - mouseY) * 0.03;
        particles.position.x = mouseX * 0.001;
        particles.position.y = -mouseY * 0.001;

        renderer.render(scene, camera);
      }

      animate();

      // Handle resize
      window.addEventListener('resize', function () {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Pause when tab is hidden
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          cancelAnimationFrame(animationId);
        } else {
          animate();
        }
      });
    })();
  </script>
